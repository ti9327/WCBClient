sentence=Client library for joining a Wireless Communication Board (WCB) ESP-NOW network.
paragraph=Allows any ESP32-based device to participate as a native peer in a WCB network. Supports unicast and broadcast text commands, raw binary forwarding for Pololu/Maestro servo packets via WCBStream, ETM heartbeat and ACK tracking, and board online/offline status callbacks.
