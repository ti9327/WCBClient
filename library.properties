name=WCB_Client
version=1.3.1
author=Greg Hulette
maintainer=Greg Hulette
sentence=Client library for joining a Wireless Communication Board (WCB) ESP-NOW network.
paragraph=Allows any ESP32-based device to participate as a native peer in a WCB network. Supports unicast and broadcast text commands with automatic fragmentation for long commands (e.g. saving large stored sequences), raw binary forwarding for Pololu/Maestro servo packets via WCBStream, ETM heartbeat and ACK tracking, and board online/offline status callbacks.
category=Communication
url=https://github.com/greghulette/WCBClient
architectures=esp32
