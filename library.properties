name=WCB_Client
version=1.7.0
author=Greg Hulette
maintainer=Greg Hulette
sentence=Client library for joining a Wireless Communication Board (WCB) ESP-NOW network.
paragraph=Allows any ESP32-based device to participate as a native peer in a WCB network. Supports unicast and broadcast text commands with automatic fragmentation for long commands (e.g. saving large stored sequences), raw binary forwarding for Pololu/Maestro servo packets via WCBStream, ETM heartbeat and ACK tracking, board online/offline status callbacks, and communication with an out-of-band special peer such as NaviCore via enableSpecialPeer(). A raw-packet hook (onRawPacket/sendRawPacket) lets custom protocols — such as firmware OTA — ride the same ESP-NOW mesh. setIdentity() advertises the device over WDP so WCBs discover it by name and firmware version automatically (the mesh twin of the serial WDP-DA device-announce model).
category=Communication
url=https://github.com/greghulette/WCBClient
architectures=esp32
